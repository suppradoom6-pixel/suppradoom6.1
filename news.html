<!doctype html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ข่าวสารหมู่บ้าน</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="icon" type="image/x-icon" sizes="16x16" href="logo/logotitle.png" />
  <style>
    :root {
      --primary: #1a3a5c;
      --accent: #c8a951;
      --bg: #f0f4f8;
      --white: #ffffff;
      --shadow: 0 10px 30px rgba(26, 58, 92, 0.08);
    }

    body {
      font-family: 'Sarabun', 'Noto Sans Thai';
      margin: 0;
      background-color: var(--bg);
      color: #444;
      overflow-x: hidden;
    }

    .ticker-wrap {
      background: whitesmoke;
      color: #000000;
      padding: 14px 0;
      overflow: hidden;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .ticker-move {
      display: inline-block;
      animation: ticker-animation 50s linear infinite;
    }

    .ticker-item {
      display: inline-block;
      padding: 0 60px;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .ticker-item b {
      color: rgb(0, 0, 0);
      margin-right: 8px;
    }

    @keyframes ticker-animation {
      0% {
        transform: translateX(100%);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    header {
      background: linear-gradient(135deg, var(--white) 0%, #e8edf4 100%);
      color: var(--primary);
      padding: 80px 20px 100px 20px;
      text-align: center;
      position: relative;
      border-bottom: none;
      overflow: hidden;
    }

    header h1 {
      font-size: 42px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
      text-shadow: none;
      position: relative;
      z-index: 2;
    }

    header h1 i {
      color: var(--accent);
      margin-right: 10px;
      font-size: 38px;
      vertical-align: middle;
    }

    header::before {
      content: "";
      position: absolute;
      top: -50px;
      right: -50px;
      width: 250px;
      height: 250px;
      background: rgba(26, 58, 92, 0.08);
      border-radius: 50%;
      filter: blur(40px);
      z-index: 1;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto 80px;
      display: grid;
      grid-template-columns: 1.8fr 1fr;
      gap: 40px;
      padding: 0 20px;
      position: relative;
      z-index: 10;
    }

    .news-item {
      background: var(--white);
      border-radius: 20px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 320px 1fr;
      margin-bottom: 30px;
      box-shadow: var(--shadow);
      transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
      text-decoration: none;
      color: inherit;
      opacity: 0;
      transform: translateY(40px);
      border: 1px solid rgba(26, 58, 92, 0.1);
    }

    .news-item.active {
      opacity: 1;
      transform: translateY(0);
    }

    .news-item:hover {
      transform: translateY(-12px) scale(1.01);
      box-shadow: 0 20px 40px rgba(26, 58, 92, 0.15);
      border-left: 8px solid var(--accent);
    }

    .news-thumb {
      width: 100%;
      height: 100%;
      min-height: 240px;
      overflow: hidden;
    }

    .news-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 1s;
    }

    .news-item:hover .news-thumb img {
      transform: scale(1.15) rotate(2deg);
    }

    .news-content {
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .news-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      margin: 0 0 15px;
      line-height: 1.5;
    }

    .news-desc {
      font-size: 15px;
      color: #666;
      line-height: 1.8;
      margin-bottom: 20px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .news-meta {
      font-size: 13px;
      color: #999;
      display: flex;
      gap: 25px;
      padding-top: 15px;
      border-top: 1px solid #f0f0f0;
    }

    .news-meta i {
      color: var(--accent);
      margin-right: 5px;
    }

    .sidebar-box {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .sidebar-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-title::after {
      content: "";
      flex: 1;
      height: 2px;
      background: var(--accent);
      opacity: 0.3;
    }

    .hot-link {
      display: flex;
      align-items: center;
      padding: 12px 0;
      text-decoration: none;
      color: #555;
      transition: 0.3s;
      border-bottom: 1px dashed #eee;
    }

    .hot-link:hover {
      color: var(--accent);
      padding-left: 10px;
    }

    .hot-link i {
      font-size: 8px;
      margin-right: 12px;
      color: var(--accent);
    }

    .float-back {
      position: fixed;
      bottom: 30px;
      left: 30px;
      background: var(--primary);
      color: var(--white);
      padding: 10px 24px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(26, 58, 92, 0.2);
      z-index: 1000;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .float-back:hover {
      background: var(--accent);
      transform: translateX(-8px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        margin-top: 20px;
      }

      .news-item {
        grid-template-columns: 1fr;
        border-radius: 15px;
      }

      .news-thumb {
        height: 200px;
      }

      .news-content {
        padding: 20px;
      }

      header {
        padding: 60px 20px;
      }

      header h1 {
        font-size: 28px;
      }

      aside {
        order: 2;
      }
    }

    .action-btn {
      background-color: var(--primary);
      color: var(--white);
      border: none;
      padding: 10px 28px;
      font-size: 16px;
      font-family: 'Sarabun', 'Noto Sans Thai';
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(26, 58, 92, 0.2);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .action-btn:hover {
      background-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    /* Dark Mode */
    body.dark-mode {
      background-color: #0a0f1a !important;
    }

    body.dark-mode header {
      background: #070d18 !important;
    }

    body.dark-mode header h1,
    body.dark-mode header p,
    body.dark-mode .news-title,
    body.dark-mode .sidebar-title {
      color: #d0dce8 !important;
    }

    body.dark-mode .news-item,
    body.dark-mode .sidebar-box {
      background-color: #0f1c2e !important;
      border-color: #1e3a58 !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5) !important;
    }

    body.dark-mode .news-desc,
    body.dark-mode .hot-link {
      color: #7a98b8 !important;
    }

    body.dark-mode .ticker-wrap {
      background: #070d18 !important;
      color: #d0dce8 !important;
      border-bottom: 1px solid #1e3a58 !important;
    }

    body.dark-mode .ticker-item b {
      color: var(--accent) !important;
    }

    body.dark-mode .sidebar-box {
      background: #0f1c2e !important;
      border: 1px solid #1e3a58 !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5) !important;
    }

    body.dark-mode .sidebar-box h3,
    body.dark-mode .sidebar-box p {
      color: #d0dce8 !important;
    }

    body.dark-mode .sidebar-box a[href*="lin.ee"] {
      background: #162436 !important;
      color: #06c755 !important;
      border: 1px solid #06c755 !important;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5) !important;
    }

    body.dark-mode .sidebar-box a[href*="lin.ee"]:hover {
      background: #06c755 !important;
      color: #ffffff !important;
    }

    body.dark-mode .action-btn {
      background-color: #162436 !important;
      color: var(--accent) !important;
      border: 1px solid var(--accent) !important;
    }

    body.dark-mode .action-btn:hover {
      background-color: var(--accent) !important;
      color: #0a0f1a !important;
    }

    body.dark-mode .hot-link {
      color: #cccccc !important;
      border-bottom: 1px dashed #444444 !important;
    }

    body.dark-mode .hot-link i {
      color: var(--accent) !important;
    }

    body.dark-mode .hot-link:hover {
      color: #ffffff !important;
      border-bottom-color: var(--accent) !important;
    }

    body.dark-mode .fa-calendar-check,
    body.dark-mode .fa-eye,
    body.dark-mode .fa-newspaper {
      color: var(--accent) !important;
      opacity: 0.9;
    }

    body.dark-mode .news-meta,
    body.dark-mode .news-meta span {
      color: #ffffff !important;
    }

    body.dark-mode .float-back {
      background-color: #2a2a2a !important;
      color: var(--accent) !important;
      border: 1px solid var(--accent) !important;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5) !important;
    }

    body.dark-mode .float-back:hover {
      background-color: var(--accent) !important;
      color: #121212 !important;
      transform: translateX(-8px) !important;
    }

    /* Search & Filter */
    .filter-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 30px;
      background: var(--white);
      padding: 20px;
      border-radius: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(181, 138, 33, 0.1);
    }

    .search-box {
      position: relative;
      width: 100%;
    }

    .search-box input {
      width: 100%;
      padding: 12px 20px 12px 45px;
      border: 2px solid #f0f0f0;
      border-radius: 50px;
      font-family: 'Sarabun', 'Noto Sans Thai';
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
      transition: all 0.3s;
      background: #fafafa;
    }

    .search-box input:focus {
      border-color: var(--accent);
      background: var(--white);
      box-shadow: 0 0 15px rgba(26, 58, 92, 0.1);
    }

    .search-box i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
    }

    .category-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cat-btn {
      background: #f8f8f8;
      color: var(--primary);
      border: 1px solid #eee;
      padding: 8px 20px;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Sarabun', 'Noto Sans Thai';
      font-size: 14px;
      transition: 0.3s;
    }

    .cat-btn:hover {
      background: rgba(26, 58, 92, 0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .cat-btn.active {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
    }

    .news-category-badge {
      display: inline-block;
      background: rgba(26, 58, 92, 0.15);
      color: var(--accent);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    body.dark-mode .filter-container {
      background: #0f1c2e;
      border-color: #1e3a58;
    }

    body.dark-mode .search-box input {
      background: #162436;
      border-color: #1e3a58;
      color: #fff;
    }

    body.dark-mode .cat-btn {
      background: #162436;
      border-color: #1e3a58;
      color: #d0dce8;
    }

    body.dark-mode .cat-btn.active {
      background: var(--accent);
      color: #0a0f1a;
      border-color: var(--accent);
    }

    body.dark-mode .news-category-badge {
      background: rgba(200, 169, 81, 0.2);
      color: var(--accent);
    }

    /* Share btn */
    .share-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-family: 'Sarabun', 'Noto Sans Thai';
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 50px;
      transition: all 0.3s;
    }

    .share-btn:hover {
      background: rgba(200, 169, 81, 0.1);
      transform: translateY(-2px);
    }

    .news-meta-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    body.dark-mode .share-btn {
      color: var(--accent);
    }

    body.dark-mode .share-btn:hover {
      background: rgba(200, 169, 81, 0.15);
    }

    /* Modal */
    .news-modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background-color: var(--white);
      margin: 5% auto;
      padding: 0;
      border-radius: 20px;
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      animation: modalFadeIn 0.3s ease;
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .close-modal {
      position: sticky;
      top: 15px;
      right: 20px;
      float: right;
      font-size: 30px;
      font-weight: bold;
      cursor: pointer;
      color: #999;
      z-index: 10;
    }

    .modal-body {
      padding: 30px;
    }

    .modal-body img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    .modal-body h2 {
      color: var(--primary);
      margin-bottom: 15px;
    }

    .modal-body p {
      line-height: 1.8;
      color: #444;
      white-space: pre-line;
    }

    body.dark-mode .modal-content {
      background-color: #1e1e1e;
      color: #fff;
    }

    body.dark-mode .modal-body p {
      color: #ccc;
    }
  </style>

  <script>
    // ตรวจจับ Dark Mode ทันที
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark-mode");
    }
  </script>
</head>

        nav_home: "首页", nav_news: "新闻", nav_personnel: "人员", nav_contact: "联系我们", nav_history: "历史",
        theme_light: "白天模式", theme_dark: "夜间模式", btn_back: "返回", btn_more: "了解更多", loading: "加载中...",

        news_page_title: "萨普拉杜村新闻", news_breaking: "突发新闻:", news_fetching: "正在收集萨普拉杜村最新新闻...", news_search: "搜索主题或新闻详情...", news_hot: "今日新闻", news_contact_box: "联系村庄", news_contact_desc: "通过 LINE Official 举报问题或询问更多信息", btn_addline: "添加 LINE 好友", btn_collapse: "收起", news_not_found: "未找到您搜索的新闻"
      }
    };

    // ฟังก์ชัน Apply ภาษาที่หน้าข่าวดึงมาใช้
    function applyCurrentLanguage() {
      const lang = localStorage.getItem("app_lang") || "th";
      document.querySelectorAll("[data-i18n]").forEach(element => {
        const key = element.getAttribute("data-i18n");
        if (translations[lang] && translations[lang][key]) {
          element.innerHTML = translations[lang][key];
        }
      });

      // จัดการ Placeholder ในช่องค้นหา
      const searchInput = document.getElementById("searchInput");
      if (searchInput && translations[lang].news_search) {
        searchInput.placeholder = translations[lang].news_search;
      }
    }

    // ============================================
    // โค้ดดึงข่าวเดิม
    // ============================================
    function escapeHTML(str) {
      if (str === null || str === undefined) return "";
      return String(str).replace(/[&<>'"]/g, function (tag) {
        const charsToReplace = { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' };
        return charsToReplace[tag] || tag;
      });
    }

    function formatThaiDate(dateString) {
      if (!dateString) return "ไม่ระบุวันที่";
      let cleanDate = dateString.toString().replace(/00:00:00 GMT\+0700 \(Indochina Time\)/gi, "").trim();
      let d = new Date(cleanDate);
      if (!isNaN(d.getTime())) {
        return d.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
      }
      return cleanDate;
    }

    const API_URL = "https://script.google.com/macros/s/AKfycbwzN3twd-y3hkRqqhP0-HOtj-181zii3YI-qktN2O9yh2IRFESVDWwlbgaMSQRxBdhfFA/exec";
    const API_KEY = "SuppradooSecret_2024";

    let allNewsData = [];
    let isExpanded = false;
    let currentCategory = "ทั้งหมด";
    let searchQuery = "";
    let allCategories = [];

    async function getNews() {
      try {
        const response = await fetch(`${API_URL}?key=${API_KEY}`);
        const json = await response.json();
        if (!json.success) throw new Error(json.error);
        render(json.data);
      } catch (e) {
        console.error("Error fetching news:", e);
        document.getElementById("news-container").innerHTML = "<p style='text-align:center; padding:50px;'>ไม่สามารถโหลดข้อมูลได้ในขณะนี้</p>";
      }
    }

    function render(data) {
      allNewsData = data;
      const uniqueCats = new Set(data.map(n => n.category ? String(n.category) : "").filter(c => c.trim() !== ""));
      allCategories = ["ทั้งหมด", ...Array.from(uniqueCats)];
      renderCategoryButtons();

      const ticker = document.getElementById("ticker-box");
      const hot = document.getElementById("hot-list");

      const lang = localStorage.getItem("app_lang") || "th";
      const breakText = translations[lang].news_breaking || "ข่าวด่วน:";

      ticker.innerHTML = data.map(n => `<span class="ticker-item"><b>${breakText}</b> ${escapeHTML(n.title)}</span>`).join("");
      hot.innerHTML = [...data].reverse().slice(0, 5).map(n => `<a href="javascript:void(0)" class="hot-link" onclick="openNewsModal(${allNewsData.indexOf(n)})"><i class="fa-solid fa-circle"></i> ${escapeHTML(n.title)}</a>`).join("");

      updateNewsDisplay();
    }

    function renderCategoryButtons() {
      const catContainer = document.getElementById("category-buttons");
      if (!catContainer) return;
      catContainer.innerHTML = allCategories.map(cat => `
            <button class="cat-btn ${cat === currentCategory ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>
        `).join('');
    }

    function setCategory(cat) {
      currentCategory = cat;
      isExpanded = false;
      renderCategoryButtons();
      updateNewsDisplay();
    }

    function searchNews(text) {
      searchQuery = text.toLowerCase();
      isExpanded = false;
      updateNewsDisplay();
    }

    function updateNewsDisplay() {
      const list = document.getElementById("news-container");
      const lang = localStorage.getItem("app_lang") || "th";

      let filteredData = allNewsData.filter(n => {
        const catStr = n.category ? String(n.category) : "";
        const titleStr = n.title ? String(n.title).toLowerCase() : "";
        const descStr = n.desc ? String(n.desc).toLowerCase() : "";

        const matchCategory = (currentCategory === "ทั้งหมด") || (catStr === currentCategory);
        const matchSearch = titleStr.includes(searchQuery) || descStr.includes(searchQuery);
        return matchCategory && matchSearch;
      });

      const itemsToShow = isExpanded ? filteredData : filteredData.slice(0, 6);

      if (filteredData.length === 0) {
        list.innerHTML = `<div style="text-align: center; padding: 60px 20px; color: #888;">
                <i class="fa-solid fa-box-open fa-3x" style="margin-bottom: 15px; opacity: 0.5;"></i>
                <p>${translations[lang].news_not_found}</p>
            </div>`;
        return;
      }

      let html = itemsToShow.map(n => `
        <div class="news-item" onclick="openNewsModal(${allNewsData.indexOf(n)})" style="cursor:pointer">
            <div class="news-thumb"><img src="${escapeHTML(n.img)}" onerror="this.src='logo/logo.png'"></div>
            <div class="news-content">
                <div>
                    <span class="news-category-badge">${escapeHTML(n.category)}</span>
                    <h3 class="news-title">${escapeHTML(n.title)}</h3>
                    <p class="news-desc">${escapeHTML(n.desc)}</p>
                </div>
                <div class="news-meta">
                    <div class="news-meta-wrapper">
                        <span><i class="fa-regular fa-calendar-check"></i> ${escapeHTML(formatThaiDate(n.date))}</span>
                        <button onclick="event.stopPropagation(); shareNews('${encodeURIComponent(n.title)}')" class="share-btn" title="Share">
                            <i class="fa-solid fa-share-nodes"></i> Share
                        </button>
                    </div>
                </div>
            </div>
        </div>`).join("");

      if (filteredData.length > 6) {
        html += `<div style="text-align: center; margin-top: 40px; padding-bottom: 20px;">`;
        if (!isExpanded) {
          html += `<button onclick="toggleNews()" class="action-btn"><i class="fa-solid fa-angle-down"></i> ${translations[lang].btn_more}</button>`;
        } else {
          html += `<button onclick="toggleNews()" class="action-btn"><i class="fa-solid fa-angle-up"></i> ${translations[lang].btn_collapse}</button>`;
        }
        html += `</div>`;
      }

      list.innerHTML = html;

      const obs = new IntersectionObserver((ents) => {
        ents.forEach((ent) => {
          if (ent.isIntersecting) ent.target.classList.add("active");
        });
      }, { threshold: 0.1 });
      document.querySelectorAll(".news-item").forEach((i) => obs.observe(i));
    }

    function shareNews(encodedTitle) {
      const title = decodeURIComponent(encodedTitle);
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: 'News', text: `Read "${title}": `, url: url }).catch((e) => console.log(e));
      } else {
        navigator.clipboard.writeText(url).then(() => {
          alert(`Copied link to clipboard!\n\n${title}`);
        }).catch(err => { alert('Cannot copy link.'); });
      }
    }

    function toggleNews() {
      isExpanded = !isExpanded;
      updateNewsDisplay();
      if (!isExpanded) {
        const container = document.querySelector(".filter-container");
        const y = container.getBoundingClientRect().top + window.scrollY - 100;
        window.scrollTo({ top: y, behavior: "smooth" });
      }
    }

    window.onload = function () {
      applyCurrentLanguage(); // สั่งให้แปลภาษาตามหน้าแรกที่เลือกไว้
      getNews();
    };

    function openNewsModal(index) {
      const news = allNewsData[index];
      const modal = document.getElementById("newsModal");
      const modalData = document.getElementById("modalData");

      modalData.innerHTML = `
        <img src="${escapeHTML(news.img)}" onerror="this.src='logo/logo.png'">
        <span class="news-category-badge">${escapeHTML(news.category)}</span>
        <h2>${escapeHTML(news.title)}</h2>
        <p><i class="fa-regular fa-calendar-check"></i> ${escapeHTML(formatThaiDate(news.date))}</p>
        <hr style="opacity:0.1; margin:20px 0;">
        <p>${escapeHTML(news.desc)}</p>
      `;

      modal.style.display = "block";
      document.body.style.overflow = "hidden";
    }

    function closeNewsModal() {
      document.getElementById("newsModal").style.display = "none";
      document.body.style.overflow = "auto";
    }

    window.onclick = function (event) {
      const modal = document.getElementById("newsModal");
      if (event.target == modal) closeNewsModal();
    }
  </script>
</body>

</html>
